<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Durak Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root{
      --bg:#0b3d2e;
      --felt:#115842;
      --shadow:0 10px 30px rgba(0,0,0,.35);

      --safe-t: env(safe-area-inset-top);
      --safe-b: env(safe-area-inset-bottom);
      --safe-l: env(safe-area-inset-left);
      --safe-r: env(safe-area-inset-right);

      --deckW: 74px;
      --deckH: 114px;
      --cardW: 88px;
      --cardH: 136px;
      --cardRank: 22px;
      --cardSuit: 20px;

      --tabH: 64px;
    }

    html,body{height:100%; overflow:hidden; background:var(--bg); overscroll-behavior: none;}
    body{
      margin:0;
      background: radial-gradient(120% 120% at 50% 0%, var(--felt), var(--bg));
      color:#f8fafc;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Arial;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select:none; user-select:none;
      overscroll-behavior: none;
      touch-action: none; /* базово режем жесты страницы */
    }

    /* Browser-only overlay */
    .blockOverlay{
      position:fixed; inset:0;
      display:none;
      background: rgba(0,0,0,.72);
      z-index: 99999;
      place-items:center;
      padding: 18px;
      padding-top: calc(18px + var(--safe-t));
      padding-bottom: calc(18px + var(--safe-b));
      padding-left: calc(18px + var(--safe-l));
      padding-right: calc(18px + var(--safe-r));
      text-align:center;
    }
    .blockCard{
      width:min(520px,92vw);
      background: rgba(19,31,27,.96);
      border:1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 30px 80px rgba(0,0,0,.6);
    }
    .blockCard h2{margin:0 0 10px;}
    .blockCard a{
      display:inline-block;
      margin-top: 12px;
      text-decoration:none;
      border-radius: 999px;
      padding: 12px 14px;
      font-weight: 1000;
      background: linear-gradient(180deg,#38bdf8,#0284c7);
      color: #02131b;
    }

    .app{
      position:fixed; inset:0;
      padding-top: var(--safe-t);
      padding-left: var(--safe-l);
      padding-right: var(--safe-r);
      padding-bottom: calc(var(--safe-b) + var(--tabH));
      box-sizing:border-box;
    }

    .screen{
      position:absolute;
      inset: 0;
      padding: calc(26px + 46px) 12px 12px;
      overflow:hidden;
      box-sizing:border-box;
      display:none;
    }
    .screen.active{display:block;}

    /* Bottom Tabs */
    .tabs{
      position:fixed;
      left: var(--safe-l);
      right: var(--safe-r);
      bottom: var(--safe-b);
      height: var(--tabH);
      display:flex;
      gap: 8px;
      align-items:center;
      justify-content:space-between;
      padding: 8px 10px;
      box-sizing:border-box;
      background: rgba(0,0,0,.28);
      border-top: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
      z-index: 200;
    }
    .tabBtn{
      flex:1;
      min-width: 0;
      border:none;
      border-radius: 14px;
      padding: 10px 8px;
      font-weight: 1000;
      font-size: 12px;
      background: rgba(255,255,255,.10);
      color:#fff;
      cursor:pointer;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      touch-action: manipulation;
    }
    .tabBtn.active{
      background: rgba(56,189,248,.92);
      color:#02131b;
    }
    .tabs.hidden{display:none;}

    /* Common UI */
    .cardPanel{
      background: rgba(19,31,27,.84);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-top: 20px;
    }
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .col{display:flex; flex-direction:column; gap:10px;}
    .title{font-weight:1000; font-size: 18px;}
    .muted{opacity:.85; font-size: 13px; line-height: 1.3;}
    .btn{
      border:none;
      border-radius: 999px;
      padding: 12px 14px;
      font-weight:1000;
      font-size: 15px;
      cursor:pointer;
      touch-action: manipulation;
    }
    .modeBtn{
      width: 100%;
      height: 88px;
      border-radius: 7px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap: 6px;
      padding: 8px 10px;
      text-align:center;
      line-height:1;
    }
    .modeIcon{
      width: 36px;
      height: 36px;
      stroke: #0b1220;
      stroke-width: 2;
      fill: none;
    }
    .modeIconMini{
      width: 18px;
      height: 18px;
      stroke: #fff;
      stroke-width: 2;
      fill: none;
    }
    .modeIcons{
      display:flex;
      gap: 6px;
      align-items:center;
    }
    .modePill{
      padding: 6px 8px;
    }
    .modeLabel{
      font-size: 13px;
      font-weight: 900;
      color:#0b1220;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .modeRow{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 12px;
      align-items:stretch;
    }
    .btn.blue{background: linear-gradient(180deg,#38bdf8,#0284c7); color:#02131b;}
    .btn.green{background: linear-gradient(180deg,#34d399,#059669); color:#06120c;}
    .btn.orange{background: linear-gradient(180deg,#fbbf24,#b45309); color:#1a1200;}
    .btn.gray{background: linear-gradient(180deg,#94a3b8,#64748b); color:#0b1220;}
    .btn.red{background: linear-gradient(180deg,#fb7185,#be123c); color:#1f0b12;}
    .btn:disabled{opacity:.6; cursor:not-allowed;}
    .iconBtn{
      min-width: 40px;
      width: 40px;
      height: 40px;
      padding: 6px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 18px;
    }
    .flagBtn{
      background: rgba(0,0,0,.5);
      color:#fff;
      border: 1px solid rgba(255,255,255,.2);
    }

    .input{
      width: 100%;
      box-sizing:border-box;
      border:none;
      border-radius: 999px;
      padding: 12px 14px;
      font-size: 16px; /* iOS zoom fix */
      outline:none;
      touch-action: manipulation;
    }

    .switch{
      display:flex; align-items:center; gap:10px;
      font-weight: 900;
    }
    .check{
      width: 22px; height: 22px;
      border-radius: 8px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      display:grid; place-items:center;
      cursor:pointer;
      user-select:none;
      touch-action: manipulation;
    }
    .check::after{
      content:"";
      font-weight: 1000;
      font-size: 14px;
      line-height: 1;
    }
    .check.on{
      background: rgba(34,197,94,.92);
      color:#06120c;
      border-color: rgba(34,197,94,.92);
    }
    .check.on::after{ content:"✓"; }

    .list{
      display:flex;
      flex-direction:column;
      gap: 10px;
      overflow:auto;
      max-height: calc(100vh - var(--safe-t) - var(--safe-b) - var(--tabH) - 30px);
      padding-right: 4px;
      overscroll-behavior: contain; /* IMPORTANT */
      touch-action: pan-y;
    }
    .listItem{
      display:flex;
      flex-direction:column;
      gap: 8px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.12);
    }
    .listTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
    }
    .pill{
      font-weight:1000;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.12);
      white-space:nowrap;
    }
    .playersLine{
      font-weight: 900;
      font-size: 13px;
      opacity: .95;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .err{
      color:#fca5a5;
      font-weight: 1000;
      min-height: 18px;
    }

    /* ===== GAME UI ===== */
    .gameWrap{
      position:fixed; inset:0;
      display:none;
      z-index: 5000;
      padding:
        calc(12px + var(--safe-t))
        calc(12px + var(--safe-r))
        calc(10px + var(--safe-b))
        calc(12px + var(--safe-l));
      box-sizing:border-box;
    }
    .gameWrap.active{display:block;}

    .tableWrap{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding-top: 88px;
      box-sizing:border-box;
    }
    .table{
      width:min(840px, 92vw);
      height:min(460px, 50vh);
      background: rgba(17,88,66,.92);
      border-radius: 22px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.12);
      position:relative;
      overflow:hidden;
      touch-action:none;
    }

    /* Opponents top (outside table) */
    .enemyArea{
      position: fixed;
      top: calc(8px + var(--safe-t) + 46px);
      left: calc(10px + var(--safe-l));
      right: calc(10px + var(--safe-r));
      z-index: 5400;
      display:flex;
      justify-content:center;
      pointer-events:none;
    }
    .enemyRow{
      width: min(720px, 96vw);
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: minmax(36px, auto);
      justify-items:center;
      gap: 8px 10px;
      padding: 6px 8px;
      pointer-events:none;
    }
    .enemy{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 16px;
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.12);
      max-width: 220px;
      min-width: 0;
      pointer-events:none;
    }
	.enemy.me{ pointer-events:auto; }
    .enemy.me .avatarInner{ pointer-events:auto; cursor:pointer; }
    .enemy .avatarWrap{
      width: 30px; height: 30px;
      position: relative;
      display:grid;
      place-items:center;
    }
    .enemy .avatarInner{
      width: 30px; height: 30px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      display:grid; place-items:center;
      font-weight:1000;
      overflow:hidden;
      position: relative;
      z-index: 2;
    }
    /* Timer ring around avatar (blue, 30s) */
    .enemy .avatarWrap .timerRing{
      position:absolute;
      inset:-7px;
      width: calc(100% + 14px);
      height: calc(100% + 14px);
      pointer-events:none;
      transform: rotate(-90deg);
      z-index: 1;
    }
    .enemy .avatarWrap .timerRing circle{
      fill: none;
      stroke: #35b6ff;
      stroke-width: 3.5;
      stroke-linecap: round;
      opacity: 0;
      transition: opacity .2s ease;
    }
    .enemy .avatarWrap .timerRing.active circle{ opacity: .95; }

    /* Emoji FX on avatar (3s, scale up + fade out) */
    .avatarEmojiFx{
      position:absolute;
      left:50%;
      top:50%;
      transform: translate(-50%,-50%) scale(0);
      font-size: 50px;
      line-height: 1;
      opacity: 0;
      pointer-events:none;
      animation: avatarEmojiPop 3s ease-out forwards;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.35));
      z-index: 3;
    }
    .avatarEmojiFloat{
      position:absolute;
      left:50%;
      top:-10px;
      transform: translate(-50%,-50%) scale(0);
      font-size: 50px;
      line-height: 1;
      opacity: 0;
      pointer-events:none;
      animation: avatarEmojiPop 3s ease-out forwards;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.35));
      z-index: 3;
    }
    @keyframes avatarEmojiPop{
      0%   { transform: translate(-50%,-50%) scale(0);   opacity:0; }
      12%  { transform: translate(-50%,-50%) scale(1); opacity:1; }
      70%  { transform: translate(-50%,-50%) scale(1); opacity:1; }
      100% { transform: translate(-50%,-50%) scale(1); opacity:0; }
    }

    /* End badges (crown/skull) zoom + fade */
    .endBadge{
      position:absolute;
      left:50%;
      top:-24px;
      transform: translate(-50%,0) scale(0);
      font-size: 50px;
      line-height: 1;
      opacity: 0;
      pointer-events:none;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,.35));
      animation: endBadgePop 3s ease-out forwards;
      z-index: 4;
    }
    @keyframes endBadgePop{
      0%   { transform: translate(-50%,0) scale(0); opacity:0; }
      12%  { transform: translate(-50%,0) scale(1); opacity:1; }
      70%  { transform: translate(-50%,0) scale(1); opacity:1; }
      100% { transform: translate(-50%,0) scale(1); opacity:0; }
    }

    .enemy .avatarInner img{width:100%; height:100%; object-fit:cover;}
    .enemy .name{
      font-weight: 1000;
      font-size: 12px;
      opacity: .95;
      white-space: normal;
      overflow:hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      line-height: 1.1;
    }
    .enemy .cards{
      display:flex;
      align-items:center;
      gap: 0;
      margin-left: 12px;
      max-width: 120px;
      flex-shrink: 0;
    }
    .enemy .cardBack{
      width: 18px;
      height: 26px;
      border-radius: 6px;
      background: linear-gradient(180deg, rgba(2,132,199,.9), rgba(30,64,175,.85));
      border: 1px solid rgba(255,255,255,.25);
      box-shadow: 0 4px 10px rgba(0,0,0,.35);
      margin-left: -12px;
      transform-origin: bottom center;
    }

    /* Slots */
    .pairs{
      position:absolute;
      inset: 0;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 16px;
      padding: 18px;
      box-sizing:border-box;
      z-index: 5;
    }
    .pair{
      position:relative;
      border-radius: 18px;
      background: transparent;
      border: none;
      display:flex;
      align-items:center;
      justify-content:center;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .pair.drop-ok{
      background: transparent;
      outline: 2px dashed rgba(34,197,94,.55);
      transform: scale(1.02);
    }
    .pair.drop-bad{
      background: transparent;
      outline: 2px dashed rgba(248,113,113,.55);
    }
    .pair.transfer-target{
      outline: 2px dashed rgba(56,189,248,.6);
      background: rgba(56,189,248,.1);
    }

    /* Transfer Zone */
    .transferZone{
      position:absolute;
      left: 50%;
      top: 58%;
      transform: translate(-50%,-50%);
      width: 86px;
      height: 130px;
      border-radius: 16px;
      border: 2px dashed rgba(255,255,255,.30);
      background: rgba(255,255,255,.10);
      display:none;
      z-index: 40;
      align-items:center;
      justify-content:center;
    }
    .transferZone.show{display:flex;}
    .transferInner{
      width: 70px;
      height: 108px;
      border-radius: 14px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.12);
      position:relative;
    }
    .transferArrow{
      position:absolute;
      inset:-18px;
      border-radius: 20px;
      border: 2px solid rgba(56,189,248,.55);
      opacity:.55;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{transform: scale(1); opacity:.50;}
      50%{transform: scale(1.05); opacity:.80;}
    }

    .transferZone.drop-ok{
      border-color: rgba(34,197,94,.65);
      background: rgba(34,197,94,.14);
    }
    .transferZone.drop-bad{
      border-color: rgba(248,113,113,.65);
      background: rgba(248,113,113,.14);
    }

    /* Cards */
    .card{
      width: var(--cardW);
      height: var(--cardH);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.86));
      color:#0b1220;
      position: relative;
      box-shadow: 0 10px 25px rgba(0,0,0,.35);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding: 10px;
      box-sizing:border-box;
      user-select:none;
      touch-action:none;
      transition: transform .12s ease;
      cursor: pointer; /* как кнопка */
    }
    .card .corner{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap: 4px;
      line-height: 1;
    }
    .card .corner.bottom{
      position:absolute;
      right: 10px;
      bottom: 10px;
      align-items:flex-end;
      transform: rotate(180deg);
    }
    .card .r{font-weight:1000; font-size: var(--cardRank); line-height:1;}
    .card .s{font-weight:1000; font-size: var(--cardSuit); line-height:1;}
    .card .big{
      position:absolute; inset:0;
      display:grid; place-items:center;
      font-weight:1000;
      font-size: 38px;
      opacity: .28;
      pointer-events:none;
    }
    .red{ color:#b91c1c; }
    .black{ color:#111827; }

    .card.playable{ outline: 2px solid rgba(34,197,94,.55); }
    .card.lift{ transform: translateY(-18px) scale(1.02); z-index: 999; }
    .card.deal-in{ animation: dealIn .75s ease-out; }

    @keyframes dealIn{
      0%{ transform: translate(-220px, 90px) scale(.85); opacity: 0; }
      100%{ transform: translate(0,0) scale(1); opacity: 1; }
    }

    .discardGhost{
      position: fixed;
      z-index: 99999;
      pointer-events:none;
      animation: discardSlide .75s ease-in-out forwards;
    }
    @keyframes discardSlide{
      0%{ transform: translate(0,0) scale(1); opacity: 1; }
      100%{ transform: translate(var(--dx, 160px), var(--dy, -80px)) scale(.6); opacity: 0; }
    }

    /* Deck outside table (left) */
    .deckPanel{
      position: fixed;
      left: calc(10px + var(--safe-l));
      top: 50%;
      transform: translateY(-50%);
      z-index: 5100;
      display:flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events:none;
    }
    .deckWrap{
      width: var(--deckW);
      height: calc(var(--deckH) + 18px);
      position: relative;
    }
    .deckCard{
      width: var(--deckW);
      height: var(--deckH);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(2,132,199,.9), rgba(30,64,175,.85));
      box-shadow: 0 10px 25px rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.14);
    }
    .trumpBadge{
      position:absolute;
      right: -6px;
      bottom: 8px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: rgba(255,255,255,.9);
      display:grid;
      place-items:center;
      font-size: 18px;
      font-weight: 1000;
      box-shadow: 0 10px 25px rgba(0,0,0,.35);
    }
    .deckCount{
      position:absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      font-weight: 1000;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.12);
      padding: 4px 10px;
      border-radius: 999px;
      color:#fff;
    }

    /* Discard pile (right) removed in UI */

    /* Hand */
    .handWrap{
      position: fixed;
      left: calc(10px + var(--safe-l));
      right: calc(10px + var(--safe-r));
      bottom: calc(10px + var(--safe-b));
      z-index: 5200;
      display:flex;
      justify-content:center;
      pointer-events:none;
    }
    .hand{
      pointer-events:auto;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap: 8px;
      overflow-x:auto;
      padding: 8px 10px;
      max-width: 100%;
      width: 100%;
      box-sizing:border-box;
      touch-action: pan-x;
      overscroll-behavior: contain;
      -ms-overflow-style:none;
      scrollbar-width:none;
    }
    .hand::-webkit-scrollbar{display:none;}
    .hand.fan{ justify-content:center; }
    .hand.fan .card{ margin-left: -34px; }
    .hand.fan .card:first-child{ margin-left: 0; }

    /* Controls */
    .controls{
      position: fixed;
      right: calc(10px + var(--safe-r));
      bottom: calc(12px + var(--safe-b));
      z-index: 5300;
      display:flex;
      flex-direction:column;
      gap: 10px;
      align-items:flex-end;
      pointer-events:none;
    }
    .pillStatus{
      pointer-events:none;
      font-weight: 1000;
      font-size: 13px;
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.12);
      padding: 8px 12px;
      border-radius: 999px;
      backdrop-filter: blur(8px);
      max-width: min(520px, 86vw);
      white-space:nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .modeBadges{
      pointer-events:none;
      display:flex;
      gap: 6px;
      align-items:center;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(8px);
    }
    .controls .btn{pointer-events:auto; min-width: 170px;}
    .topCenterControls{
      position: fixed;
      top: calc(6px + var(--safe-t));
      left: 50%;
      transform: translateX(-50%);
      z-index: 5400;
      display:flex;
      flex-direction:column;
      gap: 10px;
      pointer-events:none;
    }
    .topCenterControls .btn{pointer-events:auto;}

    /* Result overlay */
    .resultOverlay{
      position:fixed; inset:0;
      display:none !important;
      background: rgba(0,0,0,.72);
      z-index: 9999;
      place-items:center;
      padding: 18px;
      padding-top: calc(18px + var(--safe-t));
      padding-bottom: calc(18px + var(--safe-b));
      padding-left: calc(18px + var(--safe-l));
      padding-right: calc(18px + var(--safe-r));
      text-align:center;
      touch-action: none;
    }
    .resultOverlay.show{display:grid;}
    .resultCard{
      width:min(520px,92vw);
      background: rgba(19,31,27,.96);
      border:1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 30px 80px rgba(0,0,0,.6);
    }
    .resultTitle{ font-weight: 1000; font-size: 22px; margin-bottom: 8px; }
    .resultMsg{ opacity:.9; margin-bottom: 12px; }

    /* Touch drag ghost */
    .ghost{
      position: fixed;
      z-index: 99999;
      pointer-events:none;
      transform: translate(-50%,-50%);
    }

    @media (max-width: 520px){
      :root{
        --deckW: 66px;
        --deckH: 102px;
        --cardW: 74px;
        --cardH: 112px;
        --cardRank: 18px;
        --cardSuit: 16px;
      }
      .hand.fan .card{ margin-left: -28px; }
      .tabBtn{font-size:11px; padding: 10px 6px;}
      .enemyRow{width: min(520px, 96vw);}
      .modeBtn{height: 84px;}
      .modeLabel{font-size: 12px;}
      .table{height:min(420px, 46vh);}
      .table{width:min(320px, 78vw);}
      .deckPanel{
        left: calc(-12px + var(--safe-l));
      }
    }
    @media (min-width: 900px){
      :root{
        --cardW: 96px;
        --cardH: 148px;
        --cardRank: 26px;
      --cardSuit: 22px;
    }
    .card .big{ font-size: 46px; }
    .controls .btn{min-width: 140px;}
  }
  </style>
</head>

<body>

  <div class="blockOverlay" id="blockOverlay">
    <div class="blockCard">
      <h2>Открой в Telegram</h2>
      <div>Это приложение работает только внутри Telegram Mini App.</div>
      <a id="openBotLink" href="#" target="_blank" rel="noopener">ткрыть в Telegram</a>
    </div>
  </div>

  <div class="app" id="app">

    <!-- PROFILE -->
    <div class="screen active" id="screenProfile">
      <div class="cardPanel">
        <div class="row" style="justify-content:space-between;">
          <div class="row" style="gap:12px;">
            <div id="profAva" style="width:46px;height:46px;border-radius:999px;background:rgba(255,255,255,.14);display:grid;place-items:center;font-weight:1000;overflow:hidden;"></div>
            <div class="col" style="gap:4px;">
              <div class="title" id="profName">Player</div>
              <div class="muted" id="profUser">@</div>
            </div>
          </div>
        </div>

        <div style="height:12px;"></div>

        <div class="row" style="justify-content:space-between; gap:12px;">
          <div class="col" style="flex:1; min-width: 220px;">
            <div class="muted">Быстрая игра</div>
            <div class="row">
              <button class="btn blue" id="btnQuick">Быстрая игра</button>
              <button class="btn gray" id="btnQuickCancel" style="display:none;">Отменить</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- PUBLIC -->
    <div class="screen" id="screenPublic">
      <div class="cardPanel">
        <div class="row" style="justify-content:space-between;">
          <div class="title">Публичные лобби</div>
          <button class="btn gray" id="btnRefreshPub">Обновить</button>
        </div>
        <div style="height:10px;"></div>
        <div class="list" id="listPublic"></div>
        <div class="err" id="errPublic"></div>
      </div>
    </div>

    <!-- PRIVATE -->
    <div class="screen" id="screenPrivate">
      <div class="cardPanel">
        <div class="row" style="justify-content:space-between;">
          <div class="title">Закрытые лобби</div>
          <button class="btn gray" id="btnRefreshPriv">Обновить</button>
        </div>
        <div style="height:10px;"></div>
        <div class="list" id="listPrivate"></div>
        <div class="err" id="errPrivate"></div>
      </div>
    </div>

    <!-- CREATE -->
    <div class="screen" id="screenCreate">
      <div class="cardPanel">
        <div class="title">Создать лобби</div>
        <div style="height:10px;"></div>

        <div class="row">
          <div class="col" style="flex:1; min-width:220px;">
            <div class="muted">Количество игроков</div>
            <div class="row">
              <button class="btn gray" id="btnP2">2</button>
              <button class="btn gray" id="btnP3">3</button>
              <button class="btn gray" id="btnP4">4</button>
              <button class="btn gray" id="btnP5">5</button>
              <button class="btn gray" id="btnP6">6</button>
            </div>
          </div>
        </div>

        <div style="height:10px;"></div>

        <div class="modeRow">
          <button class="btn gray modeBtn" id="btnTransferOff" aria-label="Подкидной">
            <svg class="modeIcon" viewBox="0 0 48 48" aria-hidden="true">
              <rect x="10" y="12" width="18" height="24" rx="3" />
              <path d="M30 24h10" />
              <path d="M36 20l4 4-4 4" />
            </svg>
            <span class="modeLabel">Подкидной</span>
          </button>
          <button class="btn gray modeBtn" id="btnTransferOn" aria-label="Переводной">
            <svg class="modeIcon" viewBox="0 0 48 48" aria-hidden="true">
              <rect x="10" y="12" width="18" height="24" rx="3" />
              <path d="M24 21a5 5 0 1 1-3-3" />
              <path d="M23 16h5v5" />
            </svg>
            <span class="modeLabel">Переводной</span>
          </button>
          <button class="btn gray modeBtn" id="btnThrowAll" aria-label="От всех">
            <svg class="modeIcon" viewBox="0 0 48 48" aria-hidden="true">
              <rect x="14" y="16" width="20" height="16" rx="3" />
              <path d="M8 12l6 6" />
              <path d="M40 12l-6 6" />
              <path d="M24 6v10" />
            </svg>
            <span class="modeLabel">От всех</span>
          </button>
          <button class="btn gray modeBtn" id="btnThrowNeighbors" aria-label="От соседей">
            <svg class="modeIcon" viewBox="0 0 48 48" aria-hidden="true">
              <rect x="14" y="16" width="20" height="16" rx="3" />
              <path d="M8 20l6 4" />
              <path d="M40 20l-6 4" />
            </svg>
            <span class="modeLabel">От соседей</span>
          </button>
          <button class="btn gray modeBtn" id="btnModeClassic" aria-label="Классика">
            <svg class="modeIcon" viewBox="0 0 48 48" aria-hidden="true">
              <path d="M6 30c6-10 12-14 18-14s12 4 18 14" />
              <path d="M8 32h32" />
              <circle cx="24" cy="12" r="3" />
            </svg>
            <span class="modeLabel">Классика</span>
          </button>
          <button class="btn gray modeBtn" id="btnModeDraw" aria-label="Ничья">
            <svg class="modeIcon" viewBox="0 0 48 48" aria-hidden="true">
              <rect x="12" y="10" width="24" height="28" rx="4" />
              <line x1="12" y1="24" x2="36" y2="24" />
              <circle cx="24" cy="16" r="2" />
              <circle cx="24" cy="32" r="2" />
            </svg>
            <span class="modeLabel">Ничья</span>
          </button>
        </div>

        <div style="height:10px;"></div>

        <div class="switch">
          <div class="check" id="chkPrivate"></div>
          <div>Пароль</div>
        </div>

        <div id="passWrap" style="margin-top:10px; display:none;">
          <input class="input" id="passInput" placeholder="Задай пароль (для закрытого)" inputmode="text" autocomplete="off" autocapitalize="off" />
        </div>

        <div style="height:12px;"></div>

        <div class="row">
          <button class="btn green" id="btnCreate">Создать</button>
        </div>

        <div class="err" id="errCreate"></div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabs">
    <button class="tabBtn active" id="tabProfile">Профиль</button>
    <button class="tabBtn" id="tabPublic">Публичные</button>
    <button class="tabBtn" id="tabPrivate">Закрытые</button>
    <button class="tabBtn" id="tabCreate">Создать</button>
  </div>

  <!-- GAME -->
  <div class="gameWrap" id="gameWrap">
    <div class="enemyArea">
      <div class="enemyRow" id="enemyRow"></div>
    </div>
    <div class="tableWrap">
      <div class="table" id="table">
        <div class="pairs" id="pairs"></div>

        <div class="transferZone" id="transferZone">
          <div class="transferInner">
            <div class="transferArrow"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="deckPanel">
      <div class="deckWrap">
        <div class="deckCard"></div>
        <div class="trumpBadge" id="trumpBadge">?</div>
        <div class="deckCount" id="deckCount">0</div>
      </div>
    </div>

    <div class="handWrap">
      <div class="hand" id="hand"></div>
    </div>

    <div class="controls">
      <div class="pillStatus" id="status">…</div>
      <div class="modeBadges" id="modeBadges" style="display:none;"></div>
      <button class="btn green" id="btnReady" style="display:none;">Готов</button>
      <button class="btn orange" id="btnTake" style="display:none;">Беру</button>
      <button class="btn gray" id="btnPass" style="display:none;">Пас</button>
      <button class="btn blue" id="btnEnd" style="display:none;">Бито</button>
      <button class="btn red" id="btnExitLobby" style="display:none;">Выйти (лобби)</button>
    </div>

    <div class="topCenterControls">
      <button class="btn iconBtn flagBtn" id="btnResign" style="display:none;" aria-label="Сдаться">🏳️</button>
    </div>
  </div>

  <!-- Result -->
  <div class="resultOverlay" id="resultOverlay">
    <div class="resultCard">
      <div class="resultTitle" id="resultTitle">Игра окончена</div>
      <div class="resultMsg" id="resultMsg"></div>
      <button class="btn blue" id="btnToMenu">В меню</button>
    </div>
  </div>

<script>
  // ===== Config
  const BOT_LINK = "https://t.me/evil_cardsbot";
  document.getElementById("openBotLink").href = BOT_LINK;

  const WS_URL = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws";

  // ===== Telegram detect
  const tg = window.Telegram?.WebApp;
  const inTG = !!(tg && tg.initData);

  const blockOverlay = document.getElementById("blockOverlay");
  if (!inTG) {
    blockOverlay.style.display = "grid";
  } else {
    try {
      tg.ready();
      tg.expand();
      if (typeof tg.requestFullscreen === "function") tg.requestFullscreen();
      if (typeof tg.disableClosingConfirmation === "function") tg.disableClosingConfirmation();
      if (typeof tg.setHeaderColor === "function") tg.setHeaderColor("#0b3d2e");
      if (typeof tg.setBackgroundColor === "function") tg.setBackgroundColor("#0b3d2e");
    } catch(e){}
  }

  // ===== Prevent pull-to-close / scroll close
  // Block vertical page gestures except inside .list (pan-y) and inside hand (pan-x)
  window.addEventListener("touchmove", (e) => {
    const t = e.target;
    const inList = t && t.closest && t.closest(".list");
    const inHand = t && t.closest && t.closest("#hand");
    if (!inList && !inHand) e.preventDefault();
  }, { passive:false });

  // ===== Identity
  function getUserKey(){
    if (inTG) {
      const u = tg.initDataUnsafe?.user;
      if (u?.id) return "tg:" + u.id;
    }
    let k = localStorage.getItem("evil_userKey");
    if (!k) {
      k = "web:" + Math.random().toString(16).slice(2) + Date.now().toString(16);
      localStorage.setItem("evil_userKey", k);
    }
    return k;
  }
  function getProfile(){
    if (inTG) {
      const u = tg.initDataUnsafe?.user;
      if (u) {
        const name = [u.first_name, u.last_name].filter(Boolean).join(" ").trim() || u.username || "Player";
        const username = u.username ? ("@" + u.username) : "";
        const photoUrl = u.photo_url || "";
        return { name, username, photoUrl };
      }
    }
    return { name:"Player", username:"", photoUrl:"" };
  }
  const userKey = getUserKey();
  let profile = getProfile();

  // profile UI
  const profAva = document.getElementById("profAva");
  const profName = document.getElementById("profName");
  const profUser = document.getElementById("profUser");
  function renderProfile() {
    profName.textContent = profile.name || "Player";
    profUser.textContent = profile.username || "";
    profAva.innerHTML = "";
    if (profile.photoUrl) {
      const img = document.createElement("img");
      img.src = profile.photoUrl;
      img.style.width = "100%";
      img.style.height = "100%";
      img.style.objectFit = "cover";
      profAva.appendChild(img);
    } else {
      profAva.textContent = (profile.name || "P").slice(0,1).toUpperCase();
    }
  }
  function profilesEqual(a, b){
    return a?.name === b?.name && a?.username === b?.username && a?.photoUrl === b?.photoUrl;
  }
  function refreshProfileFromTG() {
    if (!inTG) return false;
    const next = getProfile();
    if (!profilesEqual(profile, next)) {
      profile = next;
      renderProfile();
      sendMsg({ type:"profile_update", profile });
      return true;
    }
    return false;
  }
  renderProfile();
  if (inTG) {
    let tries = 0;
    const poll = setInterval(() => {
      tries += 1;
      const updated = refreshProfileFromTG();
      if (updated || tries > 12) clearInterval(poll);
    }, 500);
  }

  // ===== Tabs
  const tabsEl = document.getElementById("tabs");

  const screens = {
    profile: document.getElementById("screenProfile"),
    public: document.getElementById("screenPublic"),
    private: document.getElementById("screenPrivate"),
    create: document.getElementById("screenCreate"),
  };

  function setTab(name){
    for (const k in screens) screens[k].classList.remove("active");
    screens[name].classList.add("active");
    document.querySelectorAll(".tabBtn").forEach(b => b.classList.remove("active"));
    document.getElementById("tab"+name[0].toUpperCase()+name.slice(1)).classList.add("active");
  }

  document.getElementById("tabProfile").onclick = () => setTab("profile");
  document.getElementById("tabPublic").onclick  = () => setTab("public");
  document.getElementById("tabPrivate").onclick = () => setTab("private");
  document.getElementById("tabCreate").onclick  = () => setTab("create");

  function hideMenuForGame(on){
    tabsEl.classList.toggle("hidden", !!on);
    document.getElementById("app").style.display = on ? "none" : "block";
  }

  // ===== WS
  let ws = null;
  let lobbiesPublic = [];
  let lobbiesPrivate = [];
  let quickSearching = false;
  let kickedOff = false;

  let roomId = localStorage.getItem("evil_roomId") || "";
  let roomPass = localStorage.getItem("evil_roomPass") || "";
  let joinAttemptSource = null;

  let lobbyState = null;
  let gameState = null;
  let ready = false;
  let lobbyReadyDeadlineTs = null;

  function resetToMenu(message, disableReconnect = false){
    lobbyState = null;
    gameState = null;
    ready = false;
    joinAttemptSource = null;
    localStorage.setItem("evil_in_game", "0");
    roomId = "";
    roomPass = "";
    localStorage.setItem("evil_roomId", "");
    localStorage.setItem("evil_roomPass", "");
    if (message) {
      showError(message);
      try { alert(message); } catch {}
    }
    if (disableReconnect) kickedOff = true;
    const wrap = document.getElementById("gameWrap");
    if (wrap) wrap.classList.remove("active");
    hideMenuForGame(false);
    requestLists();
    setTab("profile");
  }

  function connectWS(){
    ws = new WebSocket(WS_URL);
    ws.onopen = () => {
      sendMsg({ type:"hello", userKey, profile });
      requestLists();
    };
    ws.onclose = () => {
      if (kickedOff) return;
      setTimeout(connectWS, 650);
    };
    ws.onmessage = (ev) => {
      let msg;
      try{ msg = JSON.parse(ev.data); }catch(e){ return; }

      if (msg.type === "error") {
        const message = msg.message || "Ошибка";
        if (message === "Комната не найдена" && joinAttemptSource === "auto") {
          joinAttemptSource = null;
          roomId = "";
          roomPass = "";
          localStorage.setItem("evil_roomId", "");
          localStorage.setItem("evil_roomPass", "");
          return;
        }
        showError(message);
        return;
      }
      if (msg.type === "emoji") {
        const seat = Number.isFinite(msg.seat) ? msg.seat : null;
        const role = msg.role || "";
        const emoji = msg.emoji || "";
        playAvatarEmoji({ seat, role, emoji });
        return;
      }

      if (msg.type === "kicked") {
        resetToMenu(msg.message || "Вы зашли с другого устройства.", true);
        return;
      }

      if (msg.type === "lobbies") {
        lobbiesPublic = Array.isArray(msg.public) ? msg.public : [];
        lobbiesPrivate = Array.isArray(msg.private) ? msg.private : [];
        renderLists();
        return;
      }

      if (msg.type === "quick_status") {
        quickSearching = !!msg.searching;
        updateQuickUI();
        if (msg.matched && msg.roomId) {
          localStorage.setItem("evil_roomId", msg.roomId);
          roomId = msg.roomId;
          roomPass = "";
          localStorage.setItem("evil_roomPass", "");
        }
        return;
      }

      if (msg.type === "lobby_created" || msg.type === "joined") {
        if (msg.roomId) {
          roomId = msg.roomId;
          localStorage.setItem("evil_roomId", roomId);
        }
        joinAttemptSource = null;
        ready = false;
        lobbyState = null;
        gameState = null;

        // ENTER FULLSCREEN GAME VIEW (lobby/game only)
        hideMenuForGame(true);
        showLobbyUI(true);
        return;
      }

      if (msg.type === "lobby_state") {
        lobbyState = msg;
        gameState = null;
        joinAttemptSource = null;
        lobbyReadyDeadlineTs = msg.readyDeadlineTs || null;
        localStorage.setItem("evil_in_game", "0");
        hideMenuForGame(true);
        renderLobby();
        showLobbyUI(true);
        return;
      }

      if (msg.type === "state") {
        gameState = msg.state;
        lobbyState = null;
        joinAttemptSource = null;
        lobbyReadyDeadlineTs = null;
        localStorage.setItem("evil_in_game", "1");
        hideMenuForGame(true);
        renderGame();
        showLobbyUI(false);
        return;
      }
    };
  }

  function sendMsg(obj){
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
  }
  function requestLists(){
    sendMsg({ type:"list_lobbies" });
  }

  connectWS();
  setInterval(() => requestLists(), 5000);

  // Refresh buttons (only in lobbies screens)
  document.getElementById("btnRefreshPub").onclick = () => requestLists();
  document.getElementById("btnRefreshPriv").onclick = () => requestLists();

  // ===== Quick match
  const btnQuick = document.getElementById("btnQuick");
  const btnQuickCancel = document.getElementById("btnQuickCancel");
  function updateQuickUI(){
    btnQuick.style.display = quickSearching ? "none" : "inline-block";
    btnQuickCancel.style.display = quickSearching ? "inline-block" : "none";
  }
  updateQuickUI();

  btnQuick.onclick = () => {
    sendMsg({ type:"quick_start", userKey, profile });
  };
  btnQuickCancel.onclick = () => {
    sendMsg({ type:"quick_cancel", userKey });
  };

  // ===== Create lobby
  let createPlayers = 2;
  let createPrivate = false;
  let createTransfer = false;
  let createWinMode = "classic";
  let createThrowInMode = "all";

  const btnP2 = document.getElementById("btnP2");
  const btnP3 = document.getElementById("btnP3");
  const btnP4 = document.getElementById("btnP4");
  const btnP5 = document.getElementById("btnP5");
  const btnP6 = document.getElementById("btnP6");

  function renderCreatePlayers(){
    btnP2.style.opacity = createPlayers===2 ? "1" : ".7";
    btnP3.style.opacity = createPlayers===3 ? "1" : ".7";
    btnP4.style.opacity = createPlayers===4 ? "1" : ".7";
    btnP5.style.opacity = createPlayers===5 ? "1" : ".7";
    btnP6.style.opacity = createPlayers===6 ? "1" : ".7";
  }

  btnP2.onclick = () => { createPlayers=2; renderCreatePlayers(); renderThrowInMode(); };
  btnP3.onclick = () => { createPlayers=3; renderCreatePlayers(); renderThrowInMode(); };
  btnP4.onclick = () => { createPlayers=4; renderCreatePlayers(); renderThrowInMode(); };
  btnP5.onclick = () => { createPlayers=5; renderCreatePlayers(); renderThrowInMode(); };
  btnP6.onclick = () => { createPlayers=6; renderCreatePlayers(); renderThrowInMode(); };

  const chkPrivate = document.getElementById("chkPrivate");
  const passWrap = document.getElementById("passWrap");
  const passInput = document.getElementById("passInput");
  function renderPrivate(){
    chkPrivate.classList.toggle("on", createPrivate);
    passWrap.style.display = createPrivate ? "block" : "none";
  }
  chkPrivate.onclick = () => { createPrivate = !createPrivate; renderPrivate(); };
  renderPrivate();

  const btnTransferOff = document.getElementById("btnTransferOff");
  const btnTransferOn = document.getElementById("btnTransferOn");
  function renderTransferCreate(){
    btnTransferOff.style.opacity = createTransfer ? ".7" : "1";
    btnTransferOn.style.opacity = createTransfer ? "1" : ".7";
  }
  btnTransferOff.onclick = () => { createTransfer = false; renderTransferCreate(); };
  btnTransferOn.onclick = () => { createTransfer = true; renderTransferCreate(); };
  renderTransferCreate();

  const btnThrowAll = document.getElementById("btnThrowAll");
  const btnThrowNeighbors = document.getElementById("btnThrowNeighbors");
  function renderThrowInMode(){
    const allowAll = createPlayers >= 4;
    if (!allowAll) createThrowInMode = "neighbors";
    btnThrowAll.style.opacity = allowAll ? (createThrowInMode === "all" ? "1" : ".7") : ".4";
    btnThrowNeighbors.style.opacity = createThrowInMode === "neighbors" ? "1" : ".7";
    btnThrowAll.disabled = !allowAll;
    btnThrowAll.style.pointerEvents = allowAll ? "auto" : "none";
  }
  btnThrowAll.onclick = () => {
    if (createPlayers < 4) return;
    createThrowInMode = "all";
    renderThrowInMode();
  };
  btnThrowNeighbors.onclick = () => {
    createThrowInMode = "neighbors";
    renderThrowInMode();
  };
  renderThrowInMode();

  const btnModeClassic = document.getElementById("btnModeClassic");
  const btnModeDraw = document.getElementById("btnModeDraw");
  function renderCreateWinMode(){
    btnModeClassic.style.opacity = (createWinMode==="classic") ? "1" : ".7";
    btnModeDraw.style.opacity = (createWinMode==="draw") ? "1" : ".7";
  }
  btnModeClassic.onclick = () => { createWinMode="classic"; renderCreateWinMode(); };
  btnModeDraw.onclick = () => { createWinMode="draw"; renderCreateWinMode(); };
  renderCreateWinMode();

  renderCreatePlayers();

  function createModeIconSvg(kind){
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "modeIconMini");
    svg.setAttribute("viewBox", "0 0 48 48");
    const add = (tag, attrs) => {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
      svg.appendChild(el);
    };
    if (kind === "transferOff") {
      add("rect", { x:10, y:12, width:18, height:24, rx:3 });
      add("path", { d:"M30 24h10" });
      add("path", { d:"M36 20l4 4-4 4" });
    } else if (kind === "transferOn") {
      add("rect", { x:10, y:12, width:18, height:24, rx:3 });
      add("path", { d:"M24 21a5 5 0 1 1-3-3" });

      add("path", { d:"M40 20l-6 4" });

  let timerState = { type: null, deadline: null, totalMs: null, activeRole: null, activeRoles: null };
  let timerRafId = 0;
  const TIMER_CIRC = 2 * Math.PI * 20;

  function setTimerState(next) {
    timerState = { type: null, deadline: null, totalMs: null, activeRole: null, activeRoles: null, ...next };
    startTimerLoop();
  }

  function startTimerLoop(){
    if (timerRafId) cancelAnimationFrame(timerRafId);
    const tick = () => {
      updateAvatarTimers();
      if (timerState.deadline && timerState.totalMs) {
        timerRafId = requestAnimationFrame(tick);
      }
    };
    timerRafId = requestAnimationFrame(tick);
  }

  function updateAvatarTimers(){
    const avatars = document.querySelectorAll(".enemy .avatarWrap");
    if (!avatars.length) return;
    const { type, deadline, totalMs, activeRole, activeRoles } = timerState;
    if (!deadline || !totalMs) {
      avatars.forEach((ava) => {
        const ring = ava.querySelector(".timerRing");
        const circle = ring?.querySelector("circle");
        if (!ring || !circle) return;
        ring.classList.remove("active");
        circle.style.strokeDasharray = `${TIMER_CIRC}`;
        circle.style.strokeDashoffset = `${TIMER_CIRC}`;
      });
      return;
    }
    const remaining = Math.max(0, deadline - Date.now());
    const p = Math.max(0, Math.min(1, remaining / totalMs));
    avatars.forEach((ava) => {
      const role = ava.dataset.role;
      const active = type === "lobby" ? true : (Array.isArray(activeRoles) ? activeRoles.includes(role) : role === activeRole);
      const ring = ava.querySelector(".timerRing");
      const circle = ring?.querySelector("circle");
      if (!ring || !circle) return;
      ring.classList.toggle("active", active);
      circle.style.strokeDasharray = `${TIMER_CIRC}`;
      circle.style.strokeDashoffset = `${TIMER_CIRC * (1 - (active ? p : 0))}`;
    });
  }

  function shortenLabel(text, max = 15){
    const str = (text || "").toString();
    if (!str) return str;
    if (str.startsWith("@")) {

      return trimmed.length >= str.length ? str : trimmed;
    }
    if (str.length <= max) return str;
    return str.slice(0, Math.max(1, max - 1)) + "…";
  }

  let lastFinishKey = null;
  function applyEndBadges(st){
    if (!st || st.phase !== "finished") return;
    const key = JSON.stringify({ winners: st.winners || [], loser: st.loser || null, winnersSeat: st.winnersSeat || [], loserSeat: st.loserSeat ?? null });
    if (key === lastFinishKey) return;
    lastFinishKey = key;

    // чистим старые
    document.querySelectorAll(".endBadge").forEach(n => n.remove());

    const roles = Array.isArray(st.roles) ? st.roles : [];
    const winners = Array.isArray(st.winners) ? st.winners : [];
    const winnersSeat = Array.isArray(st.winnersSeat) ? st.winnersSeat : [];
    const loserSeat = Number.isFinite(st.loserSeat) ? st.loserSeat : null;
    const roleToSeat = new Map(roles.map((r, idx) => [r, idx]));
    const renderedSeats = new Set();

    if (st.winMode === "classic") {
      // классик: победитель 1-й, проигравшие все остальные
      const winner = winners[0] || null;
      if (Number.isFinite(winnersSeat[0])) addBadge({ seat: winnersSeat[0] }, "👑");
      else if (winner) addBadge({ role: winner }, "👑");
      for (const r of roles) {
        if (!r) continue;
        if (winner && r === winner) continue;
        if (Number.isFinite(loserSeat) && roleToSeat.get(r) === loserSeat) {
          addBadge({ seat: loserSeat }, "💀");
        } else {
          addBadge({ role: r }, "💀");
        }
      }
      return;
    }

    // ничья-режим: проигравший последний (1 человек), остальные победители
    if (Number.isFinite(loserSeat)) addBadge({ seat: loserSeat }, "💀");
    for (const seat of winnersSeat) addBadge({ seat }, "👑");
    if (!winnersSeat.length) {
      const loser = st.loser || null;
      if (loser) addBadge({ role: loser }, "💀");
      for (const r of roles) {
        if (!r || r === loser) continue;
        addBadge({ role: r }, "👑");
      }
      return;
    }

    function addBadge({ role, seat }, emoji){
      if (Number.isFinite(seat)) {
        if (renderedSeats.has(seat)) return;
        renderedSeats.add(seat);
      }
      let ava = null;
      if (Number.isFinite(seat)) ava = document.querySelector(`.avatarWrap[data-seat="${seat}"]`);
      if (!ava && role) ava = document.querySelector(`.avatarWrap[data-role="${cssEscape(role)}"]`);
      if (!ava) return;
      const b = document.createElement("div");
      b.className = "endBadge";
      b.textContent = emoji;
      ava.appendChild(b);
      const cleanup = () => { try { b.remove(); } catch {} };
      b.addEventListener("animationend", cleanup, { once: true });
      setTimeout(cleanup, 3200);
    }
  }

      const prof = gameState.profiles?.[r] || { name:"", username:"", photoUrl:"" };

      if (r === meRole) {

        if (item._avatarWrap) {
          item._avatarWrap.onclick = (ev) => {

    trumpBadge.textContent = gameState.trumpSuit || "?";
    trumpBadge.className = "trumpBadge " + suitClass(gameState.trumpSuit);
    deckCount.textContent = String(gameState.deckCount ?? 0);
    renderDiscardPile(gameState);

    const me = gameState.youRole;
    const anyOnTable = (gameState.table || []).some(p => p);
    const allDef = anyOnTable && (gameState.table || []).filter(Boolean).every(p => p.defend);

    statusEl.textContent = gameState.phase === "finished"
      ? ""
      : (gameState.activeRole === me ? "Ваш ход" : "");
    if (modeBadges) {
      modeBadges.innerHTML = "";
      modeBadges.style.display = "none";

	btnPass.textContent = (gameState.phase === "taking" && gameState.throwInMode === "all") ? "БИТО" : "ПАС";
    btnReady.style.display = "none";
    btnTake.style.display = (gameState.phase !== "finished" && me === gameState.defender && anyOnTable && gameState.phase === "defend") ? "inline-block" : "none";
    btnPass.style.display = (gameState.phase !== "finished" && gameState.phase === "taking" && me !== gameState.defender) ? "inline-block" : "none";
    btnEnd.style.display  = (gameState.phase !== "finished" && me === gameState.attacker && gameState.phase === "attack" && allDef) ? "inline-block" : "none";
    btnExitLobby.style.display = "none";
    btnResign.style.display = (gameState.phase !== "finished") ? "inline-block" : "none";

    if (typeof prevDiscardCount === "number" && typeof gameState.discardCount === "number") {
      pendingDiscardAnimation = gameState.discardCount > prevDiscardCount;
    }
    renderSlotsForGame(gameState);
    renderTransferZone(gameState);
    renderHand(gameState);
    renderFinish(gameState);
    if (gameState.phase !== "finished") lastFinishKey = null;
	applyEndBadges(gameState);


    if (gameState.deadlineTs && gameState.turnMs) {
      const activeRoles = gameState.phase === "taking"
        ? (gameState.attackers || []).filter(r => !(gameState.takingPass && gameState.takingPass[r]))
        : null;
      setTimerState({
        type: "game",
        deadline: gameState.deadlineTs,
        totalMs: gameState.turnMs,
        activeRole: gameState.activeRole,
        activeRoles
      });
    } else {
      setTimerState({ type: null });
    }
    prevDiscardCount = gameState.discardCount ?? prevDiscardCount;
  }

  // ===== Finish overlay
  const resultOverlay = document.getElementById("resultOverlay");
  const resultTitle = document.getElementById("resultTitle");
  const resultMsg = document.getElementById("resultMsg");
  const btnToMenu = document.getElementById("btnToMenu");

  btnToMenu.onclick = () => {
    resultOverlay.classList.remove("show");
    // остаёмся в фуллскрине, но если после игры лобби неполное - оно появится в списках
    // пользователь может выйти из лобби кнопкой "Выйти (лобби)"
  };

    function renderFinish(st){
    // Оверлей результата полностью отключён (корона/череп рисуются над аватарками)
    try { resultOverlay.classList.remove("show"); } catch {}
    return;
  }


  // ===== DnD helpers
  let dragCtx = null; // { card, el }
  let touchDrag = null; // { card, originEl, ghostEl, moved }
  const TOUCH_DRAG_THRESHOLD = 4;

  function isPlayable(card){
    const st = gameState;
    if (!st) return false;
    if (st.phase === "finished") return false;
    return true; // server validates anyway; client only hints
  }

  function getNextRole(st, role){
    if (!st?.roles?.length || !role) return role;
    const idx = st.roles.indexOf(role);
    if (idx === -1) return role;
    return st.roles[(idx + 1) % st.roles.length];
  }

  function canDropToSlot(slotIndex, card){
    const st = gameState;
    if (!st) return false;
    const me = st.youRole;
    const slot = st.table?.[slotIndex] || null;

    if (me === st.defender) {
      if (st.phase !== "defend") return false;
      if (!slot || !slot.attack || slot.defend) return false;
      return true;
    }

    if (!(st.phase === "attack" || st.phase === "defend" || st.phase === "taking")) return false;
    if (st.phase === "taking") {
      if (st.takingPass?.[me]) return false;
      if (st.takingReason === "bito" && me !== st.attacker && !st.takingLeaderPassed) return false;
    }
    const defenderHand = st.handsCount?.[st.defender] ?? 0;
    const defendedCount = (st.table || []).filter(p => p && p.defend).length;
    const roundPairsLimit = st.roundIndex === 1 ? 5 : 6;
    const maxPairs = Math.min(roundPairsLimit, defenderHand + defendedCount);
    if (maxPairs <= 0) return false;
    if (st.table.filter(Boolean).length >= maxPairs) return false;
    const anyOnTable = (st.table || []).some(p => p && p.attack);
    if (!anyOnTable) return me === st.attacker;
    const ranks = new Set();
    for (const p of st.table || []) {
      if (p?.attack) ranks.add(p.attack.rank);
      if (p?.defend) ranks.add(p.defend.rank);
    }
    return ranks.has(card.rank);
  }

  function canDropToTransfer(card){
    const st = gameState;
    if (!st) return false;
    if (!st.allowTransfer) return false;
    if (st.youRole !== st.defender) return false;
    if (st.phase !== "defend") return false;

    const anyAttack = (st.table || []).some(p => p && p.attack);
    const anyDef = (st.table || []).some(p => p && p.defend);
    if (!anyAttack || anyDef) return false;

    const ranks = new Set();
    for (const p of st.table) if (p?.attack) ranks.add(p.attack.rank);
    return ranks.has(card.rank);
  }

  function doDrop(slotIndex, card){
    const st = gameState;
    if (!st) return;
    const me = st.youRole;
    const slot = st.table?.[slotIndex] || null;

    if (me === st.defender) {
      const targetAttackId = slot.attack.id;
      sendMsg({ type:"action", action:{ kind:"defend", cardId: card.id, targetAttackId } });
    } else {
      sendMsg({ type:"action", action:{ kind:"attack", cardId: card.id } });
    }
  }

  function doTransfer(card){
    sendMsg({ type:"action", action:{ kind:"transfer", cardId: card.id } });
  }

  function setLift(el, on){
    el.classList.toggle("lift", !!on);
  }

  function enableDesktopDnD(el, card){
    el.addEventListener("dragstart", (e) => {
      if (!isPlayable(card)) { e.preventDefault(); return; }
      dragCtx = { card, el };

      // cursor behavior like "move", not copy-image
      try {
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.dropEffect = "move";
      } catch {}

      const ghost = el.cloneNode(true);
      ghost.style.position = "fixed";
      ghost.style.top = "-1000px";
      ghost.style.left = "-1000px";
      ghost.style.transform = "none";
      ghost.style.margin = "0";
      document.body.appendChild(ghost);
      try { e.dataTransfer.setDragImage(ghost, ghost.offsetWidth/2, ghost.offsetHeight/2); } catch {}
      setTimeout(()=>ghost.remove(), 0);
    });

    el.addEventListener("dragend", () => {
      dragCtx = null;
      document.querySelectorAll(".pair").forEach(p => p.classList.remove("drop-ok","drop-bad"));
      transferZone.classList.remove("drop-ok","drop-bad");
    });
  }

function enableTouchDrag(el, card){
    el.addEventListener("pointerdown", (e) => {
      if (e.pointerType !== "touch") return;
      if (!isPlayable(card)) return;
      e.preventDefault();
      try { el.setPointerCapture(e.pointerId); } catch {}

      const startX = e.clientX, startY = e.clientY;
      let moved = false;

      touchDrag = { card, originEl: el, ghostEl: null, startX, startY, moved:false, lastX: startX, lastY: startY, pointerId: e.pointerId };

      const onMove = (ev) => {
        if (!touchDrag) return;
        if (ev.pointerId !== touchDrag.pointerId) return;
        ev.preventDefault();
        const dx = Math.abs(ev.clientX - startX);
        const dy = Math.abs(ev.clientY - startY);
        if (dx + dy > TOUCH_DRAG_THRESHOLD) moved = true;
        touchDrag.lastX = ev.clientX;
        touchDrag.lastY = ev.clientY;
        if (moved && !touchDrag.ghostEl) {
          const ghost = el.cloneNode(true);
          ghost.classList.add("ghost");
          ghost.style.left = ev.clientX + "px";
          ghost.style.top  = ev.clientY + "px";
          document.body.appendChild(ghost);
          touchDrag.ghostEl = ghost;
          el.style.opacity = "0.25";
        }
        if (touchDrag.ghostEl) {
          touchDrag.ghostEl.style.left = ev.clientX + "px";
          touchDrag.ghostEl.style.top  = ev.clientY + "px";
        }

        document.querySelectorAll(".pair").forEach(p => p.classList.remove("drop-ok","drop-bad"));
        transferZone.classList.remove("drop-ok","drop-bad");

        const elUnder = document.elementFromPoint(ev.clientX, ev.clientY);
        const slot = elUnder?.closest?.(".pair");
        if (slot && touchDrag) {
          const idx = Number(slot.dataset.slot);
          const ok = canDropToSlot(idx, touchDrag.card);
          slot.classList.toggle("drop-ok", ok);
          slot.classList.toggle("drop-bad", !ok);
        } else {
          const tz = elUnder?.closest?.("#transferZone");
          if (tz && transferZone.classList.contains("show")) {
            const ok = canDropToTransfer(touchDrag.card);
            transferZone.classList.toggle("drop-ok", ok);
            transferZone.classList.toggle("drop-bad", !ok);
          }
        }
      };

		const onUp = (ev) => {
        if (touchDrag && ev.pointerId !== touchDrag.pointerId) return;
        ev.preventDefault();
        window.removeEventListener("pointermove", onMove, true);
        window.removeEventListener("pointerup", onUp, true);
        window.removeEventListener("pointercancel", onUp, true);

        const td = touchDrag;
        touchDrag = null;

        document.querySelectorAll(".pair").forEach(p => p.classList.remove("drop-ok","drop-bad"));
        transferZone.classList.remove("drop-ok","drop-bad");

		if (!td) return;
        try { td.originEl.releasePointerCapture(td.pointerId); } catch {}
        td.originEl.style.opacity = "1";
        if (td.ghostEl) td.ghostEl.remove();

        if (!moved) {
          const had = td.originEl.classList.contains("lift");
          document.querySelectorAll("#hand .card").forEach(c => c.classList.remove("lift"));
          td.originEl.classList.toggle("lift", !had);
          return;
        }

        const dropX = td.lastX ?? ev.clientX;
        const dropY = td.lastY ?? ev.clientY;
        const under = document.elementFromPoint(dropX, dropY);
        const slot = under?.closest?.(".pair");
        if (slot) {
          const idx = Number(slot.dataset.slot);
          const ok = canDropToSlot(idx, td.card);
          if (ok) doDrop(idx, td.card);
          return;
        }

        const tz = under?.closest?.("#transferZone");
        if (tz && transferZone.classList.contains("show")) {
          const ok = canDropToTransfer(td.card);
          if (ok) doTransfer(td.card);
        }
      };

      window.addEventListener("pointermove", onMove, true);
      window.addEventListener("pointerup", onUp, true);
      window.addEventListener("pointercancel", onUp, true);
    });
  }

  // ===== Hand sorting (as before)
  const suitOrder = ["♣","♦","♥","♠"];
  const rankOrder = new Map([[6,0],[7,1],[8,2],[9,3],[10,4],["J",5],["Q",6],["K",7],["A",8]]);
  function sortHand(cards, trumpSuit){
    const nonTrump = cards.filter(c => c.suit !== trumpSuit);
    const trump = cards.filter(c => c.suit === trumpSuit);

    nonTrump.sort((a,b)=>{
      const sa = suitOrder.indexOf(a.suit), sb = suitOrder.indexOf(b.suit);
      if (sa !== sb) return sa - sb;
      return (rankOrder.get(a.rank) ?? 0) - (rankOrder.get(b.rank) ?? 0);
    });
    trump.sort((a,b)=> (rankOrder.get(a.rank) ?? 0) - (rankOrder.get(b.rank) ?? 0));
    return nonTrump.concat(trump);
  }

  let prevHandIds = new Set();
  function renderHand(st){
    const sorted = sortHand(st.yourHand || [], st.trumpSuit);
    handEl.innerHTML = "";
    handEl.classList.toggle("fan", sorted.length > 6);

    for (const c of sorted){
      const el = makeCardFace(c);
      if (!prevHandIds.has(c.id)) el.classList.add("deal-in");
      el.classList.toggle("playable", true);

      el.addEventListener("pointerup", (e) => {
        if (e.pointerType !== "mouse") return;
        if (dragCtx) return;
        const had = el.classList.contains("lift");
        document.querySelectorAll("#hand .card").forEach(c => c.classList.remove("lift"));
        el.classList.toggle("lift", !had);
      });

      enableDesktopDnD(el, c);
      enableTouchDrag(el, c);

      handEl.appendChild(el);
    }
    prevHandIds = new Set(sorted.map(c => c.id));
  }

  function renderTransferZone(st){
    if (!st || st.phase === "finished") { transferZone.classList.remove("show"); return; }
    const show = !!st.allowTransfer && st.youRole === st.defender && st.phase === "defend"
      && (st.table || []).some(p => p && p.attack)
      && !(st.table || []).some(p => p && p.defend);
    const ranks = new Set();
    for (const p of st.table || []) if (p?.attack) ranks.add(p.attack.rank);
    const canTransferCard = (st.yourHand || []).some(card => ranks.has(card.rank));
    const shouldShow = show && canTransferCard;

    transferZone.classList.toggle("show", shouldShow);
    if (shouldShow) {
      const slots = Array.from(document.querySelectorAll(".pair"));
      const firstEmpty = slots.find((slot) => {
        const idx = Number(slot.dataset.slot);
        return !(st.table && st.table[idx]);
      });
      if (firstEmpty) {
        const slotRect = firstEmpty.getBoundingClientRect();
        const tableRect = document.getElementById("table").getBoundingClientRect();
        transferZone.style.left = `${slotRect.left - tableRect.left + slotRect.width / 2}px`;
        transferZone.style.top = `${slotRect.top - tableRect.top + slotRect.height / 2}px`;
        transferZone.style.width = `${slotRect.width}px`;
        transferZone.style.height = `${slotRect.height}px`;
      }
    }

    // Desktop DnD on transfer zone
    transferZone.ondragover = (e) => {
      if (!dragCtx) return;
      e.preventDefault();
      const ok = canDropToTransfer(dragCtx.card);
      transferZone.classList.toggle("drop-ok", ok);
      transferZone.classList.toggle("drop-bad", !ok);
    };
    transferZone.ondragleave = () => transferZone.classList.remove("drop-ok","drop-bad");
    transferZone.ondrop = (e) => {
      if (!dragCtx) return;
      e.preventDefault();
      const ok = canDropToTransfer(dragCtx.card);
      if (ok) doTransfer(dragCtx.card);
      transferZone.classList.remove("drop-ok","drop-bad");
      dragCtx = null;
    };
  }

  let lastTableHadCards = false;
  let pendingDiscardAnimation = false;
  let prevDiscardCount = null;
  function animateDiscardFromTable(){
    const cards = Array.from(pairs.querySelectorAll(".card"));
    if (!cards.length) return;
    const targetRect = discardPanel?.classList.contains("show")
      ? discardStack.getBoundingClientRect()
      : null;
    for (const card of cards) {
      const rect = card.getBoundingClientRect();
      const ghost = card.cloneNode(true);
      ghost.classList.add("discardGhost");
      ghost.style.left = rect.left + "px";
      ghost.style.top = rect.top + "px";
      ghost.style.width = rect.width + "px";
      ghost.style.height = rect.height + "px";
      if (targetRect) {
        const targetX = targetRect.left + targetRect.width / 2;
        const targetY = targetRect.top + targetRect.height / 2;
        ghost.style.setProperty("--dx", `${targetX - rect.left}px`);
        ghost.style.setProperty("--dy", `${targetY - rect.top}px`);
      }
      document.body.appendChild(ghost);
      ghost.addEventListener("animationend", () => ghost.remove());
    }
  }

  // ===== Table slots
  function renderSlotsForGame(st){
    const hasNow = !!(st && st.table && st.table.some(p => p));
    if (pendingDiscardAnimation && lastTableHadCards && !hasNow) {
      animateDiscardFromTable();
    }
    pairs.innerHTML = "";
    for (let i=0;i<6;i++){
      const slot = document.createElement("div");
      slot.className = "pair";
      slot.dataset.slot = String(i);

      if (st && st.table && st.table[i]) {
        const pair = st.table[i];
        if (pair.attack) {
          const a = makeCardFace(pair.attack);
          a.draggable = false;
          a.style.cursor = "default";
          slot.appendChild(a);
        }
        if (pair.defend) {
          const d = makeCardFace(pair.defend);
          d.draggable = false;
          d.style.cursor = "default";
          d.style.position = "absolute";
          d.style.right = "6px";
          d.style.bottom = "6px";
          d.style.transform = "rotate(8deg)";
          slot.appendChild(d);
        }
      }

      slot.addEventListener("dragover", (e) => {
        if (!dragCtx) return;
        e.preventDefault();
        const ok = canDropToSlot(i, dragCtx.card);
        slot.classList.toggle("drop-ok", ok);
        slot.classList.toggle("drop-bad", !ok);
      });
      slot.addEventListener("dragleave", () => slot.classList.remove("drop-ok","drop-bad"));
      slot.addEventListener("drop", (e) => {
        if (!dragCtx) return;
        e.preventDefault();
        const ok = canDropToSlot(i, dragCtx.card);
        if (ok) doDrop(i, dragCtx.card);
        slot.classList.remove("drop-ok","drop-bad");
        dragCtx = null;
      });

      pairs.appendChild(slot);
    }
    lastTableHadCards = hasNow;
    pendingDiscardAnimation = false;
  }

  // ===== Errors
  function showError(text){
    errCreate.textContent = text;
    errPublic.textContent = text;
    errPrivate.textContent = text;
    // profile screen doesn't show errors to avoid extra hints
  }

  // ===== Auto rejoin (silent)
  setTimeout(() => {
    if (!roomId) return;
    if (localStorage.getItem("evil_in_game") !== "1") return;
    joinAttemptSource = "auto";
    sendMsg({ type:"join_lobby", userKey, profile, roomId, password: roomPass || "" });
  }, 900);

</script>
</body>
